services:
  # PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: healthai-db
    environment:
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai_pass
      POSTGRES_DB: healthai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U healthai -d healthai_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend Service
  backend:
    image: python:3.11-slim
    container_name: healthai-backend
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir -e . && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://healthai:healthai_pass@db:5432/healthai_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production-64chars}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      MLFLOW_TRACKING_URI: http://mlflow:5000
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_pip_cache:/root/.cache/pip
    restart: unless-stopped

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: healthai-mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://healthai:healthai_pass@db:5432/mlflow_db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      bash -c "pip install psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://healthai:healthai_pass@db:5432/mlflow_db --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    restart: unless-stopped

  # Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    container_name: healthai-frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts:
  backend_pip_cache:
